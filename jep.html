  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"6b8479aa-595f-4040-a33a-cd7f87997f76\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<script>\n(function(){\n  var pc1=document.createElement('link');pc1.rel='preconnect';pc1.href='https://fonts.googleapis.com';document.head.appendChild(pc1);\n  var pc2=document.createElement('link');pc2.rel='preconnect';pc2.href='https://fonts.gstatic.com';pc2.crossOrigin='anonymous';document.head.appendChild(pc2);\n  var f=document.createElement('link');f.rel='stylesheet';f.href='https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap';document.head.appendChild(f);\n})();\n<\u002Fscript>\n<script src=\"de928a62-31a8-41bd-bd0a-488744afa064\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  html{scroll-behavior:smooth;}\n  body{margin:0;background:#FBFAF6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n  ::selection{background:#C1121F;color:#fff;}\n  image-slot{display:block;}\n  @keyframes jepRise{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:none;}}\n\n  @media (max-width:860px){\n    .jep-sec{padding-left:20px !important;padding-right:20px !important;}\n    .jep-mcol{grid-template-columns:1fr !important;gap:22px !important;}\n    .jep-navlink{display:none !important;}\n    .jep-qrdiv{display:none !important;}\n    .jep-hero-h1{font-size:34px !important;}\n  }\n  @media (max-width:560px){\n    .jep-sec{padding-top:64px !important;padding-bottom:64px !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:'Zen Kaku Gothic New',sans-serif;color:#241E16;background:#FBFAF6;overflow-x:hidden;\">\n\n  <!-- ============ STICKY HEADER ============ -->\n  <header style=\"position:sticky;top:0;z-index:60;background:rgba(251,250,246,.88);backdrop-filter:blur(12px);border-bottom:1px solid #E7E0D2;\">\n    <div class=\"jep-sec\" style=\"max-width:1180px;margin:0 auto;padding:13px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <a href=\"#top\" style=\"display:flex;align-items:center;gap:12px;text-decoration:none;\">\n        <image-slot id=\"logo\" style=\"width:38px;height:38px;\" shape=\"rounded\" radius=\"8\" placeholder=\"LOGO\"><\u002Fimage-slot>\n        <span style=\"display:flex;flex-direction:column;line-height:1.15;\">\n          <span style=\"font-weight:700;font-size:15px;letter-spacing:.04em;color:#241E16;\">JEP<\u002Fspan>\n          <span style=\"font-size:9px;letter-spacing:.14em;color:#8C8375;\">EVENT PRODUCTION<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fa>\n      <nav style=\"display:flex;align-items:center;gap:26px;font-size:12.5px;font-weight:500;letter-spacing:.02em;\">\n        <a href=\"#reason\" class=\"jep-navlink\" style=\"color:#5C554A;text-decoration:none;\">選ばれる理由<\u002Fa>\n        <a href=\"#service\" class=\"jep-navlink\" style=\"color:#5C554A;text-decoration:none;\">サービス<\u002Fa>\n        <a href=\"#flow\" class=\"jep-navlink\" style=\"color:#5C554A;text-decoration:none;\">流れ<\u002Fa>\n        <a href=\"#works\" class=\"jep-navlink\" style=\"color:#5C554A;text-decoration:none;\">実績<\u002Fa>\n        <a href=\"#member\" class=\"jep-navlink\" style=\"color:#5C554A;text-decoration:none;\">メンバー<\u002Fa>\n        <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:7px;background:#C1121F;color:#fff;text-decoration:none;padding:9px 18px;border-radius:999px;font-weight:700;letter-spacing:.03em;\">お問い合わせ<span style=\"font-size:11px;\">→<\u002Fspan><\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <section class=\"jep-sec\" id=\"top\" style=\"position:relative;background:#FBFAF6;padding:76px 40px 0;overflow:hidden;\">\n    <div style=\"position:absolute;top:-120px;right:-80px;width:520px;height:520px;border:1px solid #EFE7D6;border-radius:50%;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:absolute;top:40px;right:60px;width:340px;height:340px;border:1px solid #F3E9D6;border-radius:50%;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;position:relative;padding:64px 0 80px;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:38px;animation:jepRise .7s ease both;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">PROPOSAL<\u002Fspan>\n        <span style=\"font-size:12px;font-weight:500;letter-spacing:.18em;color:#A79C88;\">イベント設営のご提案<\u002Fspan>\n      <\u002Fdiv>\n      <h1 class=\"jep-hero-h1\" style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:clamp(42px,6.4vw,88px);line-height:1.18;letter-spacing:.01em;color:#241E16;margin:0 0 32px;text-wrap:balance;animation:jepRise .8s ease .06s both;\">\n        <span style=\"color:#C1121F;\">ベトナム<\u002Fspan> <span style=\"font-size:.62em;color:#B7AC96;\">×<\u002Fspan> <span style=\"color:#241E16;\">日本<\u002Fspan>のチカラで、<br>忘れられない<span style=\"position:relative;\">ステージ<span style=\"position:absolute;left:0;right:0;bottom:-2px;height:8px;background:linear-gradient(90deg,#C1121F22,#B5883633);border-radius:2px;\"><\u002Fspan><\u002Fspan>を。\n      <\u002Fh1>\n      <p style=\"max-width:640px;font-size:17px;line-height:2;color:#5C554A;margin:0 0 8px;animation:jepRise .8s ease .12s both;\">企画から設営・撤去まで、ワンストップで一貫対応。ゲート・ステージ・テントの空間づくりを、確かな技術と真心でお引き受けします。<\u002Fp>\n      <p style=\"max-width:640px;font-size:12.5px;line-height:1.8;letter-spacing:.04em;color:#A79C88;margin:0 0 42px;animation:jepRise .8s ease .16s both;\">An unforgettable stage, powered by Vietnam × Japan — from planning to setup and teardown, handled end to end.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;animation:jepRise .8s ease .2s both;\">\n        <span style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid #E2D9C7;background:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:500;\"><span style=\"color:#C1121F;font-weight:700;\">01<\u002Fspan>ゲート <span style=\"color:#B7AC96;font-size:11px;letter-spacing:.08em;\">GATE<\u002Fspan><\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid #E2D9C7;background:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:500;\"><span style=\"color:#C1121F;font-weight:700;\">02<\u002Fspan>ステージ <span style=\"color:#B7AC96;font-size:11px;letter-spacing:.08em;\">STAGE<\u002Fspan><\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;border:1px solid #E2D9C7;background:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:500;\"><span style=\"color:#C1121F;font-weight:700;\">03<\u002Fspan>テント <span style=\"color:#B7AC96;font-size:11px;letter-spacing:.08em;\">TENT<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;animation:jepRise .9s ease .28s both;\">\n      <image-slot id=\"hero\" style=\"width:100%;height:clamp(260px,42vw,500px);\" shape=\"rounded\" radius=\"20\" placeholder=\"メインビジュアル（ステージ設営の写真）を差し込み\"><\u002Fimage-slot>\n    <\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;padding:22px 0 84px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;\">\n      <span style=\"font-size:12.5px;letter-spacing:.06em;color:#8C8375;\">一般社団法人 在日ベトナム人安全協会 JEP<\u002Fspan>\n      <span style=\"font-size:12px;letter-spacing:.14em;color:#C0B6A2;\">事業案内 ・ ご提案書<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 01 INTRODUCTION ============ -->\n  <section class=\"jep-sec\" id=\"intro\" style=\"scroll-margin-top:76px;background:#241E16;color:#F4EFE5;padding:118px 40px;position:relative;overflow:hidden;\">\n    <div style=\"position:absolute;top:0;right:0;width:44%;height:100%;background:radial-gradient(circle at 80% 20%,#3a2f22,transparent 60%);pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#E4746E;\">INTRODUCTION<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#8C8069;\">01<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.4;margin:0 0 20px;letter-spacing:.02em;\">はじめに ― 本提案の目的<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#9A8E78;margin:0 0 54px;\">About this proposal<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:1.15fr 1fr;gap:70px;align-items:start;\">\n        <div>\n          <p style=\"font-size:17px;line-height:2.15;color:#E3DCCE;margin:0 0 26px;\">イベントの成否は、ゲート・ステージ・テントといった<strong style=\"color:#fff;font-weight:700;\">「空間の作り込み」<\u002Fstrong>に大きく左右されます。一方で、複数業者の手配・安全管理・短期間での設営は、主催者にとって大きな負担になりがちです。<\u002Fp>\n          <p style=\"font-size:17px;line-height:2.15;color:#E3DCCE;margin:0;\">JEPは、企画・設計から施工・撤去までを<strong style=\"color:#fff;font-weight:700;\">一社で一貫<\u002Fstrong>してお引き受けします。ベトナム×日本のチーム力で、「任せて安心」のイベント設営をご提供します。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-left:1px solid #4A3F30;padding-left:34px;\">\n          <p style=\"font-family:'Shippori Mincho',serif;font-size:22px;line-height:1.9;color:#F4EFE5;margin:0 0 22px;\">2つの国の「らしさ」を、<br>ひとつの会場に。<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:2;color:#B9AD97;margin:0 0 20px;\">ベトナムの祭りが持つ大胆さと華やかさ。日本の現場が積み重ねてきた緻密さと安全性。相反する2つの強みを掛け合わせ、これまでにない斬新なイベント空間を生み出します。<\u002Fp>\n          <p style=\"font-size:14.5px;line-height:2;color:#B9AD97;margin:0;\">私たちは単なる「設営業者」ではなく、お客様のイベントを共につくり上げる<strong style=\"color:#E4746E;font-weight:700;\">パートナー<\u002Fstrong>でありたいと考えています。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:64px;padding-top:40px;border-top:1px solid #3A3122;display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"font-family:'Shippori Mincho',serif;font-size:40px;line-height:1;color:#B58836;\">“<\u002Fspan>\n        <p style=\"font-family:'Shippori Mincho',serif;font-size:clamp(20px,2.6vw,30px);line-height:1.7;color:#F4EFE5;margin:0;max-width:900px;\">人が安心して集い、心から楽しめる場をつくる。<span style=\"color:#C0B49C;font-size:.7em;display:block;margin-top:14px;font-family:'Zen Kaku Gothic New';line-height:1.9;\">JEPは在日ベトナム人の安全を支える活動を母体に生まれた団体です。だからこそ私たちの設営は、見た目の華やかさだけでなく「安全に楽しめること」を何よりも大切にします。国籍や文化の違いを越えて人が集う場を、確かな技術と真心で支える ― それが私たちの使命です。<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 CHALLENGE ============ -->\n  <section class=\"jep-sec\" id=\"challenge\" style=\"scroll-margin-top:76px;background:#F2EDE3;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">CHALLENGE<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">02<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">こんなお悩み、ありませんか？<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 56px;\">Common challenges for event organizers<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:16px;padding:38px 36px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px;\"><span style=\"width:40px;height:40px;border-radius:10px;background:#C1121F;color:#fff;font-family:'Shippori Mincho',serif;font-size:22px;display:flex;align-items:center;justify-content:center;\">?<\u002Fspan><h3 style=\"font-size:19px;font-weight:700;margin:0;\">複数業者の手配が煩雑<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:2;color:#5C554A;margin:0;\">ゲートはA社、ステージはB社、テントはC社……と窓口が分かれると、それぞれ打ち合わせ・見積り・日程調整が必要に。連絡の行き違いや手配の重複に追われ、本来集中すべきイベントの中身づくりに時間を割けなくなります。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:16px;padding:38px 36px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px;\"><span style=\"width:40px;height:40px;border-radius:10px;background:#C1121F;color:#fff;font-family:'Shippori Mincho',serif;font-size:22px;display:flex;align-items:center;justify-content:center;\">?<\u002Fspan><h3 style=\"font-size:19px;font-weight:700;margin:0;\">安全面が不安<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:2;color:#5C554A;margin:0;\">屋外の大型設営は、強風対策や来場者の安全への配慮が欠かせません。万一の事故は主催者の責任問題に直結します。強度計算や安全管理まで含めて安心して任せられる相手が、なかなか見つからない ― 多くの主催者が抱える不安です。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:16px;padding:38px 36px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px;\"><span style=\"width:40px;height:40px;border-radius:10px;background:#C1121F;color:#fff;font-family:'Shippori Mincho',serif;font-size:22px;display:flex;align-items:center;justify-content:center;\">?<\u002Fspan><h3 style=\"font-size:19px;font-weight:700;margin:0;\">多国籍イベントの勝手がわからない<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:2;color:#5C554A;margin:0;\">各国コミュニティの催事は、文化や慣習によって求められる演出・運営が異なります。前例が少なく「何を・どう準備すればいいのか」が手探りに。さらに言葉の壁があると、打ち合わせ自体もスムーズに進みません。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:16px;padding:38px 36px;\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px;\"><span style=\"width:40px;height:40px;border-radius:10px;background:#C1121F;color:#fff;font-family:'Shippori Mincho',serif;font-size:22px;display:flex;align-items:center;justify-content:center;\">?<\u002Fspan><h3 style=\"font-size:19px;font-weight:700;margin:0;\">準備期間が短い<\u002Fh3><\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:2;color:#5C554A;margin:0;\">会場の使用可能日が限られ、設営から本番、撤去までを短い期間でこなさなければならない。少しの遅れが全体のスケジュールに響きます。タイトな日程でも、滞りなく確実にやり遂げてくれる業者が必要です。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:34px;background:#241E16;color:#fff;border-radius:16px;padding:30px 40px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;\">\n        <span style=\"color:#E4746E;font-size:22px;\">▶<\u002Fspan>\n        <p style=\"margin:0;font-size:clamp(17px,2.2vw,22px);font-weight:700;font-family:'Shippori Mincho',serif;letter-spacing:.02em;\">そのすべてを、JEPが企画から撤去まで<span style=\"color:#E4746E;\">ワンストップ<\u002Fspan>で解決します。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 REASON ============ -->\n  <section class=\"jep-sec\" id=\"reason\" style=\"scroll-margin-top:76px;background:#FBFAF6;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">REASON<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">03<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">選ばれる3つの理由<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 60px;\">Why organizers choose JEP<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:0;\">\n        <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:120px 1fr 1.35fr;gap:40px;align-items:start;padding:44px 0;border-top:1px solid #E7E0D2;\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:56px;color:#C1121F;line-height:1;\">01<\u002Fspan>\n          <div>\n            <h3 style=\"font-size:24px;font-weight:700;margin:0 0 10px;line-height:1.5;\">ベトナム × 日本の融合<\u002Fh3>\n            <p style=\"font-size:13px;letter-spacing:.06em;color:#A79C88;margin:0 0 14px;\">Where boldness meets safety<\u002Fp>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:17px;color:#C1121F;margin:0;line-height:1.7;\">「斬新さ」と「安心」は、両立できる。<\u002Fp>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:2.1;color:#5C554A;margin:0;\">大胆な発想と、丁寧で安全な施工。日本の業者だけでは無難で予定調和なステージになりがち。一方、海外チームだけに任せると安全管理や納期に不安が残る ― 両国の強みを掛け合わせることで、印象に残るステージをつくります。<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:120px 1fr 1.35fr;gap:40px;align-items:start;padding:44px 0;border-top:1px solid #E7E0D2;\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:56px;color:#C1121F;line-height:1;\">02<\u002Fspan>\n          <div>\n            <h3 style=\"font-size:24px;font-weight:700;margin:0 0 10px;line-height:1.5;\">企画から撤去まで<br>ワンストップ<\u002Fh3>\n            <p style=\"font-size:13px;letter-spacing:.06em;color:#A79C88;margin:0 0 14px;\">One window, start to finish<\u002Fp>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:17px;color:#C1121F;margin:0;line-height:1.7;\">窓口がひとつだから、迷わない・待たせない。<\u002Fp>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:2.1;color:#5C554A;margin:0;\">通常、イベント設営はデザイン会社・資材業者・施工スタッフ・撤去業者と複数に分かれ、トラブル時も責任が曖昧になりがち。JEPは図面設計・資材手配・当日の施工・終了後の撤去までを自社で一貫対応。ご連絡いただく窓口はひとつだけです。<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:120px 1fr 1.35fr;gap:40px;align-items:start;padding:44px 0;border-top:1px solid #E7E0D2;border-bottom:1px solid #E7E0D2;\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:56px;color:#C1121F;line-height:1;\">03<\u002Fspan>\n          <div>\n            <h3 style=\"font-size:24px;font-weight:700;margin:0 0 10px;line-height:1.5;\">全国対応<\u002Fh3>\n            <p style=\"font-size:13px;letter-spacing:.06em;color:#A79C88;margin:0 0 14px;\">Nationwide mobility<\u002Fp>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:17px;color:#C1121F;margin:0;line-height:1.7;\">開催地を選ばない、機動力。<\u002Fp>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:2.1;color:#5C554A;margin:0;\">名古屋を拠点に、神戸・福岡・横浜・東京・大阪など全国各地で設営を手がけてきました。出張を前提とした機動力のあるチーム体制だからこそ、開催地を問わずご相談いただけます。「近くに良い業者がいない」を、私たちが解決します。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 04 SERVICE ============ -->\n  <section class=\"jep-sec\" id=\"service\" style=\"scroll-margin-top:76px;background:#F2EDE3;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">SERVICE<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">04<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">サービス内容<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 56px;\">What we do<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px;\">\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:18px;overflow:hidden;\">\n          <image-slot id=\"svc-gate\" style=\"width:100%;height:210px;\" shape=\"rect\" placeholder=\"ゲート設営の写真\"><\u002Fimage-slot>\n          <div style=\"padding:32px 34px;\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:12px;\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.14em;color:#C1121F;\">GATE<\u002Fspan><h3 style=\"font-size:21px;font-weight:700;margin:0;\">ゲート企画・設営<\u002Fh3><\u002Fdiv>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:16px;color:#3A342A;margin:0 0 14px;line-height:1.7;\">来場者の「第一印象」をデザインします。<\u002Fp>\n            <p style=\"font-size:14px;line-height:2;color:#5C554A;margin:0;\">エントランスゲートは来場者が最初に目にする\"会場の顔\"。イベントのテーマや主催者のブランドカラーに合わせ、企画段階からデザインをご提案。装飾・看板・サインの取り付けまで含めて設営し、「思わず写真を撮りたくなる入口」を演出します。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:18px;overflow:hidden;\">\n          <image-slot id=\"svc-stage\" style=\"width:100%;height:210px;\" shape=\"rect\" placeholder=\"ステージ設営の写真\"><\u002Fimage-slot>\n          <div style=\"padding:32px 34px;\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:12px;\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.14em;color:#C1121F;\">STAGE<\u002Fspan><h3 style=\"font-size:21px;font-weight:700;margin:0;\">ステージ企画・設営<\u002Fh3><\u002Fdiv>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:16px;color:#3A342A;margin:0 0 14px;line-height:1.7;\">規模と演出に合わせ、安全第一で組み上げます。<\u002Fp>\n            <p style=\"font-size:14px;line-height:2;color:#5C554A;margin:0;\">ステージは催事の主役が立つ最も重要な空間。だからこそ見栄えと安全性の両立が欠かせません。規模・演出内容・会場条件に合わせて最適なステージを設計・施工。屋外・屋内を問わず、小規模なコミュニティイベントから大型フェスまで柔軟に対応します。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#FBFAF6;border:1px solid #E7E0D2;border-radius:18px;overflow:hidden;\">\n          <image-slot id=\"svc-tent\" style=\"width:100%;height:210px;\" shape=\"rect\" placeholder=\"テント設営の写真\"><\u002Fimage-slot>\n          <div style=\"padding:32px 34px;\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:12px;\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.14em;color:#C1121F;\">TENT<\u002Fspan><h3 style=\"font-size:21px;font-weight:700;margin:0;\">テント設営<\u002Fh3><\u002Fdiv>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:16px;color:#3A342A;margin:0 0 14px;line-height:1.7;\">会場条件を読み、迅速・確実に設営します。<\u002Fp>\n            <p style=\"font-size:14px;line-height:2;color:#5C554A;margin:0;\">出店ブース・受付・控室・休憩スペースなど用途も多彩なテント。地面の状態・スペース・風向きといった会場条件を見極めたうえで、用途に応じて迅速かつ確実に設営。設営スピードと安全固定を両立し、急な天候の変化にも備えた施工を行います。<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#241E16;color:#F4EFE5;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;\">\n          <div style=\"padding:32px 34px;flex:1;\">\n            <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:12px;\"><span style=\"font-size:12px;font-weight:700;letter-spacing:.14em;color:#E4746E;\">ALL-IN-ONE<\u002Fspan><h3 style=\"font-size:21px;font-weight:700;margin:0;\">企画一貫対応（設計〜撤去）<\u002Fh3><\u002Fdiv>\n            <p style=\"font-family:'Shippori Mincho',serif;font-size:16px;color:#fff;margin:0 0 14px;line-height:1.7;\">最初から最後まで、すべてまとめてお任せください。<\u002Fp>\n            <p style=\"font-size:14px;line-height:2;color:#C0B49C;margin:0;\">図面設計・資材手配・当日の施工・終了後の撤去 ― 別々の業者に頼むと調整の手間も責任の曖昧さも増えます。JEPはこれらすべてを一社で完結。図面設計から原状回復まで、ひとつの窓口で一貫してお引き受けします。<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;padding:0 34px 32px;\">\n            <span style=\"font-size:12px;color:#E4746E;border:1px solid #4A3F30;border-radius:999px;padding:6px 14px;\">図面設計<\u002Fspan>\n            <span style=\"font-size:12px;color:#E4746E;border:1px solid #4A3F30;border-radius:999px;padding:6px 14px;\">資材手配<\u002Fspan>\n            <span style=\"font-size:12px;color:#E4746E;border:1px solid #4A3F30;border-radius:999px;padding:6px 14px;\">当日施工<\u002Fspan>\n            <span style=\"font-size:12px;color:#E4746E;border:1px solid #4A3F30;border-radius:999px;padding:6px 14px;\">撤去・原状回復<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 FLOW ============ -->\n  <section class=\"jep-sec\" id=\"flow\" style=\"scroll-margin-top:76px;background:#FBFAF6;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">FLOW<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">05<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">企画から撤去までの流れ<\u002Fh2>\n      <p style=\"font-size:14px;color:#5C554A;margin:0 0 8px;\">下記すべてを<strong>一社で完結<\u002Fstrong>。窓口はJEPひとつです。<\u002Fp>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 56px;\">Our end-to-end process<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:22px;\">\n        <div style=\"background:#F2EDE3;border-radius:16px;padding:32px 30px;position:relative;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.2em;color:#C1121F;\">STEP 1<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-size:34px;color:#DDD3C1;line-height:1;\">01<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;\">企画・ご提案<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#5C554A;margin:0;\">目的・規模・ご予算・会場条件を丁寧にヒアリング。最適な構成プランと概算お見積りをご提案し、完成イメージをすり合わせて安心のスタートを。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#F2EDE3;border-radius:16px;padding:32px 30px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.2em;color:#C1121F;\">STEP 2<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-size:34px;color:#DDD3C1;line-height:1;\">02<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;\">図面設計<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#5C554A;margin:0;\">安全基準に基づいた設営図面を作成。寸法・荷重・来場者の動線・安全性まで考慮し可視化。事前に図面で確認でき「思っていたものと違う」を防ぎます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#F2EDE3;border-radius:16px;padding:32px 30px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.2em;color:#C1121F;\">STEP 3<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-size:34px;color:#DDD3C1;line-height:1;\">03<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;\">資材手配<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#5C554A;margin:0;\">図面に沿って必要な資材・機材を一括で手配。自社ルートを活かした効率的な調達でコストを抑えつつ、手配漏れや数量不足のリスクを未然に防止します。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#F2EDE3;border-radius:16px;padding:32px 30px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.2em;color:#C1121F;\">STEP 4<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-size:34px;color:#DDD3C1;line-height:1;\">04<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;\">施工・設営<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#5C554A;margin:0;\">経験豊富なチームが現場で確実に施工。日本基準の安全管理を徹底し、スケジュール通りに組み上げます。仕上がりの美しさと安全性、その両方を妥協しません。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#F2EDE3;border-radius:16px;padding:32px 30px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.2em;color:#C1121F;\">STEP 5<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-size:34px;color:#DDD3C1;line-height:1;\">05<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;\">当日サポート<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#5C554A;margin:0;\">本番当日も現場にスタッフが常駐し運営・調整をサポート。急なレイアウト変更や予期せぬトラブルにも迅速に対応。主催者は進行そのものに集中いただけます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#C1121F;color:#fff;border-radius:16px;padding:32px 30px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.2em;color:#F6C9C6;\">STEP 6<\u002Fspan><span style=\"font-family:'Shippori Mincho',serif;font-size:34px;color:#E0716B;line-height:1;\">06<\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-size:19px;font-weight:700;margin:0 0 12px;\">撤去・原状回復<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#F6DEDB;margin:0;\">イベント終了後は撤去から会場の原状回復まで責任を持って対応。後片付けの負担は一切ありません。次の利用者や会場への配慮も忘れず、最後まできれいに完了させます。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 SAFETY ============ -->\n  <section class=\"jep-sec\" id=\"safety\" style=\"scroll-margin-top:76px;background:#241E16;color:#F4EFE5;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#E4746E;\">SAFETY &amp; QUALITY<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#8C8069;\">06<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">安全とクオリティへの約束<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#9A8E78;margin:0 0 56px;\">Our promise on safety &amp; quality<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;\">\n        <div style=\"display:flex;flex-direction:column;gap:34px;\">\n          <div style=\"display:flex;gap:22px;\">\n            <span style=\"font-family:'Shippori Mincho',serif;font-size:38px;color:#B58836;line-height:1;flex-shrink:0;\">01<\u002Fspan>\n            <div><h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;\">図面に基づく安全設計<\u002Fh3><p style=\"font-size:14px;line-height:2;color:#B9AD97;margin:0;\">安全は現場の勘ではなく設計段階で決まります。強度・荷重・来場者の動線・安全基準を踏まえた図面設計から着手。転倒や落下のリスクを事前に検討し、\"根拠\"を持って施工に臨みます。<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:22px;\">\n            <span style=\"font-family:'Shippori Mincho',serif;font-size:38px;color:#B58836;line-height:1;flex-shrink:0;\">02<\u002Fspan>\n            <div><h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;\">経験豊富なエンジニアによる施工<\u002Fh3><p style=\"font-size:14px;line-height:2;color:#B9AD97;margin:0;\">設計から施工までを一貫して手がけるエンジニアが現場全体を統括。「設計した人」と「施工する人」が分かれないからこそ、当日の状況に応じた的確な判断と、ブレのない高い精度で組み上げます。<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:22px;\">\n            <span style=\"font-family:'Shippori Mincho',serif;font-size:38px;color:#B58836;line-height:1;flex-shrink:0;\">03<\u002Fspan>\n            <div><h3 style=\"font-size:19px;font-weight:700;margin:0 0 10px;\">一貫体制による品質管理<\u002Fh3><p style=\"font-size:14px;line-height:2;color:#B9AD97;margin:0;\">企画から撤去まで同じチームが担当。業者間の引き継ぎで起こる情報のロスや認識のズレがなく、責任の所在も常に明確。最初から最後まで一貫して関わるからこそ、品質に堂々と責任を持てます。<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-rows:1fr 1fr;gap:16px;height:100%;min-height:420px;\">\n          <image-slot id=\"safety-1\" style=\"width:100%;height:100%;\" shape=\"rounded\" radius=\"16\" placeholder=\"施工・安全管理の写真\"><\u002Fimage-slot>\n          <image-slot id=\"safety-2\" style=\"width:100%;height:100%;\" shape=\"rounded\" radius=\"16\" placeholder=\"施工・安全管理の写真\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 07 WORKS ============ -->\n  <section class=\"jep-sec\" id=\"works\" style=\"scroll-margin-top:76px;background:#FBFAF6;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">WORKS<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">07<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">これまでの実績<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 56px;\">Selected works<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:auto auto;gap:20px;\">\n        <div style=\"grid-row:span 2;display:flex;flex-direction:column;\">\n          <image-slot id=\"work-1\" style=\"width:100%;flex:1;min-height:300px;\" shape=\"rounded\" radius=\"16\" placeholder=\"ベトナム人コミュニティフェスティバルの写真\"><\u002Fimage-slot>\n          <p style=\"font-size:15px;font-weight:700;margin:18px 0 4px;\">ベトナム人コミュニティフェスティバル<\u002Fp>\n          <p style=\"font-size:12.5px;color:#8C8375;margin:0;\">Vietnamese Community Festival<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <image-slot id=\"work-2\" style=\"width:100%;height:180px;\" shape=\"rounded\" radius=\"16\" placeholder=\"フィリピンコミュニティフェスティバル\"><\u002Fimage-slot>\n          <p style=\"font-size:14px;font-weight:700;margin:14px 0 3px;\">フィリピンコミュニティフェスティバル<\u002Fp>\n          <p style=\"font-size:12px;color:#8C8375;margin:0;\">Filipino Community Festival<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <image-slot id=\"work-3\" style=\"width:100%;height:180px;\" shape=\"rounded\" radius=\"16\" placeholder=\"各国コミュニティのステージ設営\"><\u002Fimage-slot>\n          <p style=\"font-size:14px;font-weight:700;margin:14px 0 3px;\">各国コミュニティのステージ設営<\u002Fp>\n          <p style=\"font-size:12px;color:#8C8375;margin:0;\">Multinational community stages<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <image-slot id=\"work-4\" style=\"width:100%;height:180px;\" shape=\"rounded\" radius=\"16\" placeholder=\"企業の創業記念パーティー設営\"><\u002Fimage-slot>\n          <p style=\"font-size:14px;font-weight:700;margin:14px 0 3px;\">企業の創業記念パーティー設営<\u002Fp>\n          <p style=\"font-size:12px;color:#8C8375;margin:0;\">Corporate anniversary party<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <image-slot id=\"work-5\" style=\"width:100%;height:180px;\" shape=\"rounded\" radius=\"16\" placeholder=\"イベント設営の写真\"><\u002Fimage-slot>\n          <p style=\"font-size:14px;font-weight:700;margin:14px 0 3px;\">屋外・室内イベント各種<\u002Fp>\n          <p style=\"font-size:12px;color:#8C8375;margin:0;\">Indoor &amp; outdoor events<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size:13px;color:#8C8375;margin:30px 0 0;\">※ 屋外・室内を問わず対応いたします。<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 08 AREA ============ -->\n  <section class=\"jep-sec\" id=\"area\" style=\"scroll-margin-top:76px;background:#F2EDE3;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">AREA<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">08<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">対応エリア ― 名古屋を拠点に、全国へ。<\u002Fh2>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 56px;\">Based in Nagoya, serving all of Japan<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;\">\n        <div>\n          <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-bottom:34px;\">\n            <span style=\"display:inline-flex;align-items:center;gap:8px;background:#C1121F;color:#fff;padding:11px 20px;border-radius:999px;font-size:15px;font-weight:700;\"><span style=\"width:7px;height:7px;background:#B58836;border-radius:50%;\"><\u002Fspan>名古屋（拠点）<\u002Fspan>\n            <span style=\"background:#FBFAF6;border:1px solid #E2D9C7;padding:11px 20px;border-radius:999px;font-size:15px;font-weight:500;\">東京<\u002Fspan>\n            <span style=\"background:#FBFAF6;border:1px solid #E2D9C7;padding:11px 20px;border-radius:999px;font-size:15px;font-weight:500;\">横浜<\u002Fspan>\n            <span style=\"background:#FBFAF6;border:1px solid #E2D9C7;padding:11px 20px;border-radius:999px;font-size:15px;font-weight:500;\">大阪<\u002Fspan>\n            <span style=\"background:#FBFAF6;border:1px solid #E2D9C7;padding:11px 20px;border-radius:999px;font-size:15px;font-weight:500;\">神戸<\u002Fspan>\n            <span style=\"background:#FBFAF6;border:1px solid #E2D9C7;padding:11px 20px;border-radius:999px;font-size:15px;font-weight:500;\">福岡<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:2.1;color:#5C554A;margin:0 0 22px;\">名古屋は東日本と西日本のちょうど中間に位置する交通の要衝。新幹線・高速道路網の中心にあるこの立地を拠点とすることで、関東から九州まで機材と人員をスピーディーに動かせます。<\u002Fp>\n          <p style=\"font-size:15px;line-height:2.1;color:#5C554A;margin:0;\">「近くに頼める業者がいない」― 地方開催のイベントで多く聞かれるこのお悩みこそ、私たちが力になれる場面です。掲載都市以外でも全国どこへでも出張設営いたします。まずはお気軽にご相談ください。<\u002Fp>\n        <\u002Fdiv>\n        <image-slot id=\"area-map\" style=\"width:100%;height:420px;\" shape=\"rounded\" radius=\"18\" placeholder=\"対応エリアの地図画像\"><\u002Fimage-slot>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 09 MEMBER ============ -->\n  <section class=\"jep-sec\" id=\"member\" style=\"scroll-margin-top:76px;background:#FBFAF6;padding:118px 40px;\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#C1121F;\">MEMBER<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#B0A691;\">09<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.2vw,52px);line-height:1.35;margin:0 0 14px;\">メンバー紹介<\u002Fh2>\n      <p style=\"font-size:15px;color:#5C554A;max-width:640px;margin:0 0 6px;line-height:1.9;\">国も歩みも違う<strong>個性豊かな3人<\u002Fstrong>。その掛け合わせが、JEPのチームワークの源です。<\u002Fp>\n      <p style=\"font-size:12.5px;letter-spacing:.1em;color:#A79C88;margin:0 0 56px;\">Three distinct backgrounds, one team<\u002Fp>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:30px;\">\n        <div style=\"background:#F2EDE3;border-radius:18px;padding:36px 32px;\">\n          <image-slot id=\"member-1\" style=\"width:110px;height:110px;margin-bottom:22px;\" shape=\"circle\" placeholder=\"顔写真\"><\u002Fimage-slot>\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:.1em;color:#C1121F;margin:0 0 6px;\">代表 兼 エンジニア<\u002Fp>\n          <h3 style=\"font-size:22px;font-weight:700;margin:0 0 2px;\">ボー・タンリー<\u002Fh3>\n          <p style=\"font-size:12px;letter-spacing:.12em;color:#A79C88;margin:0 0 18px;\">VO THANH LY<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:2;color:#5C554A;margin:0;\">ベトナム・ホーチミン出身、日本在住15年。図面設計から施工まで一貫して手がけるエンジニアであり、在日ベトナム人コミュニティのまとめ役として厚い信頼を集めています。運転免許取得サポートでは500人以上を支援。安全を第一に、大胆な発想で理想のステージを形にします。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#F2EDE3;border-radius:18px;padding:36px 32px;\">\n          <image-slot id=\"member-2\" style=\"width:110px;height:110px;margin-bottom:22px;\" shape=\"circle\" placeholder=\"顔写真\"><\u002Fimage-slot>\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:.1em;color:#C1121F;margin:0 0 6px;\">顧問・総務 ／ 日本側窓口<\u002Fp>\n          <h3 style=\"font-size:22px;font-weight:700;margin:0 0 2px;\">井村 稔<\u002Fh3>\n          <p style=\"font-size:12px;letter-spacing:.12em;color:#A79C88;margin:0 0 18px;\">IMURA Minoru<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:2;color:#5C554A;margin:0;\">アジアを旅する中で外国人との縁が広がり、今では日本と世界をつなぐ\"コネクター\"として活動。外国人材支援「ガイコクジンコネクト」代表として、日本側の契約・見積り・手配を担当。ボータンリーとは家族ぐるみの付き合いで、安心してご依頼いただける体制を支えます。<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#F2EDE3;border-radius:18px;padding:36px 32px;\">\n          <image-slot id=\"member-3\" style=\"width:110px;height:110px;margin-bottom:22px;\" shape=\"circle\" placeholder=\"顔写真\"><\u002Fimage-slot>\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:.1em;color:#C1121F;margin:0 0 6px;\">アシスタント<\u002Fp>\n          <h3 style=\"font-size:22px;font-weight:700;margin:0 0 2px;\">クアット・ティ・フーン<\u002Fh3>\n          <p style=\"font-size:12px;letter-spacing:.12em;color:#A79C88;margin:0 0 18px;\">KHUAT THI HUONG<\u002Fp>\n          <p style=\"font-size:13.5px;line-height:2;color:#5C554A;margin:0;\">ベトナム・ハノイ出身。技能実習生として来日した経験を持ち、ポーランド・チェコでの在住経験もある国際派。明るい性格と芯の強さでチームをまとめる存在。「ベトナムと日本をつなぐこと」をモットーに、打ち合わせから当日サポートまで、言葉の不安なくスムーズに進むよう、きめ細かく対応します。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 CONTACT ============ -->\n  <section class=\"jep-sec\" id=\"contact\" style=\"scroll-margin-top:76px;background:#241E16;color:#F4EFE5;padding:118px 40px 0;position:relative;overflow:hidden;\">\n    <div style=\"position:absolute;top:-140px;left:-100px;width:480px;height:480px;border:1px solid #3A3122;border-radius:50%;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:1180px;margin:0 auto;position:relative;\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:30px;\">\n        <span style=\"width:34px;height:1px;background:#C1121F;\"><\u002Fspan>\n        <span style=\"font-size:12px;font-weight:700;letter-spacing:.36em;color:#E4746E;\">CONTACT<\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:.18em;color:#8C8069;\">10<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"jep-mcol\" style=\"display:grid;grid-template-columns:1.1fr 1fr;gap:70px;align-items:start;\">\n        <div>\n          <p style=\"font-size:12px;font-weight:700;letter-spacing:.24em;color:#B58836;margin:0 0 18px;\">NEXT STEP ― お見積り無料<\u002Fp>\n          <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:clamp(30px,4.4vw,54px);line-height:1.4;margin:0 0 24px;\">まずはお気軽に<br>ご相談ください<\u002Fh2>\n          <p style=\"font-size:15.5px;line-height:2.1;color:#C0B49C;margin:0 0 44px;max-width:460px;\">御社のイベントに合わせた最適なプランを、ご提案いたします。ご相談・概算のお見積りは無料で承ります。<\u002Fp>\n
